kind = "web"
previewPath = "/"
title = "BirdNET Bird Identifier"
version = "1.0.0"
id = "artifacts/birdnet-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22030

[services.development]
run = "pnpm --filter @workspace/birdnet-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/birdnet-app", "run", "build" ]
publicDir = "artifacts/birdnet-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22030"
BASE_PATH = "/"
